apiVersion: apps/v1
kind: Deployment
metadata:
  name: kafka-depl
  namespace: yun-ns
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kafka
  template:
    metadata:
      labels:
        app: kafka
    spec:
      containers:
      - name: kafka
        image: apache/kafka:3.7.0
        ports:
        - containerPort: 9092
        - containerPort: 9093
        env:
        - name: KAFKA_NODE_ID
          value: "1"

        - name: KAFKA_PROCESS_ROLES
          value: "broker,controller"

        - name: KAFKA_LISTENERS
          value: "PLAINTEXT://:9092,CONTROLLER://:9093"

        - name: KAFKA_ADVERTISED_LISTENERS
          value: "PLAINTEXT://kafka-service:9092"

        - name: KAFKA_CONTROLLER_LISTENER_NAMES
          value: "CONTROLLER"

        - name: KAFKA_CONTROLLER_QUORUM_VOTERS
          value: "1@kafka:9093"

        - name: KAFKA_LOG_DIRS
          value: "/tmp/kraft-combined-logs"

        - name: KAFKA_AUTO_CREATE_TOPICS_ENABLE
          value: "true"

        - name: KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR
          value: "1"
---
apiVersion: v1
kind: Service
metadata:
  name: kafka-service
  namespace: yun-ns
spec:
  type: ClusterIP
  ports:
  - name: kafka
    port: 9092
    targetPort: 9092
  - name: controller
    port: 9093
    targetPort: 9093
  selector:
    app: kafka