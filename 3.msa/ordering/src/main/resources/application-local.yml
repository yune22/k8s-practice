server:
  #  port 번호가 0번일 경우, 0~65535중에 현재 host에서 사용하지 않는 port 임의로 설정
  port: 0

eureka:
  client:
    serviceUrl:
      defaultZone: http://localhost:8761/eureka/

product:
  service:
    url:

spring:
  config:
    activate:
      on-profile: local
  application:
    name: ordering-service
  datasource:
    driver-class-name: org.mariadb.jdbc.Driver
    url: jdbc:mariadb://localhost:3306/ordermsa
    username: root
    password: test1234

  jpa:
    database: mysql
    database-platform: org.hibernate.dialect.MariaDBDialect
    generate-ddl: true
    hibernate:
      ddl-auto: create
    show_sql: true

  redis:
    host: localhost
    port: 6379

  kafka:
    kafka-server: localhost:9092

