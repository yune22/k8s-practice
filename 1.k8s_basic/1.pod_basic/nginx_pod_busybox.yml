apiVersion: v1
kind: Pod
metadata:
  name: nginx-pinger-pod
  namespace: yun-ns
  labels:
    app: my-nginx
spec:
  containers:
  - name: nginx
    image: nginx
    ports:
    - containerPort: 80

  - name: http-pinger
    image: busybox
    command: ['sh', '-c', 'while true; do wget -qO- http://localhost:80; sleep 5; done']